#####
##
#  Plik - Production Configuration
#  SSOT: /opt/.github/COPILOT-INSTRUCTIONS.md
#  Domain: https://files.goodboog.com
##

Debug               = false
LogLevel            = "INFO"

ListenPort          = 8080
ListenAddress       = "0.0.0.0"

# Produkčná URL (potrebná pre OAuth redirecty + CORS)
PlikDomain          = "https://files.goodboog.com"

# Bezpečnostné hlavičky
EnhancedWebSecurity = true

# IP hlavička za reverse proxy (NPM)
SourceIpHeader      = "X-Forwarded-For"

# Upload limity
MaxFileSizeStr      = "100MB"
MaxUserSizeStr      = "unlimited"
MaxFilePerUpload    = 100

# TTL
DefaultTTLStr       = "7d"
MaxTTLStr           = "30d"

# Authentication: "default" = prihlásení udia aj anonymous upload
# Zmeň na "forced" ak chceš IBA prihlásených (bez anonymous)
FeatureAuthentication = "default"
FeatureLocalLogin     = "enabled"
FeatureDeleteAccount  = "enabled"

# Funkcie
FeatureOneShot        = "enabled"
FeatureRemovable      = "enabled"
FeaturePassword       = "enabled"
FeatureComments       = "enabled"
FeatureSetTTL         = "enabled"
FeatureExtendTTL      = "disabled"
FeatureText           = "enabled"
FeatureE2EE           = "enabled"
FeatureStream         = "disabled"
FeatureClients        = "enabled"
FeatureGithub         = "enabled"

# Data backend: local filesystem
DataBackend = "file"
[DataBackendConfig]
    Directory = "/plik/data"
