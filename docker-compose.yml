# Plik File Sharing - Development (VPS2)
# SSOT: /opt/.github/COPILOT-INSTRUCTIONS.md
# Port: 8085 (external), 8080 (internal)

services:
  plik-server:
    image: rootgg/plik:latest
    ports:
      - "8085:8080"
    environment:
      - PLIK_SERVER_LISTENADDR=0.0.0.0:8080
      - PLIK_MAX_FILE_SIZE=102400          # 100 MB
      - PLIK_MAX_TTL=2592000               # 30 dní (v sekundách)
      - PLIK_DATA_DIR=/plik/data
    env_file:
      - .env.development
    restart: unless-stopped
    container_name: plik-dev
    volumes:
      - plik_data:/plik/data
      - ./plikd.cfg:/home/plik/server/plikd.cfg:ro
      - ./branding/index.html:/home/plik/webapp/dist/index.html:ro
      - ./branding/favicon.ico:/home/plik/webapp/dist/favicon.ico:ro
      - ./branding:/home/plik/webapp/dist/branding:ro
    networks:
      - web-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  web-network:
    driver: bridge

volumes:
  plik_data:
    driver: local
