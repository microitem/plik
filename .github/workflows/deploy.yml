name: Deploy Plik to VPS1 (Production)

# Trigger: Push git tag (e.g., v0.1.0)
# Plik uses upstream image rootgg/plik:latest — no custom build needed
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. Checkout kódu (pre docker-compose.production.yml)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Skopíruj docker-compose.production.yml na VPS1
      - name: Copy docker-compose to VPS1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS1_HOST }}
          username: ${{ secrets.VPS1_USER }}
          key: ${{ secrets.VPS1_SSH_KEY }}
          port: ${{ secrets.VPS1_PORT }}
          source: "docker-compose.production.yml"
          target: "/opt/plik/"

      # 3. Deploy na VPS1 cez SSH
      - name: Deploy to VPS1
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS1_HOST }}
          username: ${{ secrets.VPS1_USER }}
          key: ${{ secrets.VPS1_SSH_KEY }}
          port: ${{ secrets.VPS1_PORT }}
          script: |
            set -e
            mkdir -p /opt/plik
            cd /opt/plik

            # Nastav docker-compose.yml z production variantu
            cp docker-compose.production.yml docker-compose.yml

            # Vytvor .env.production ak neexistuje
            if [ ! -f .env.production ]; then
              cat > .env.production << 'ENVEOF'
            PLIK_SERVER_LISTENADDR=0.0.0.0:8080
            PLIK_MAX_FILE_SIZE=102400
            PLIK_MAX_TTL=2592000
            PLIK_DATA_DIR=/plik/data
            PUBLIC_URL=https://files.goodboog.com
            ENVEOF
              echo "✅ .env.production created"
            else
              echo "✅ .env.production already exists"
            fi

            # Pull upstream image (fresh)
            docker pull rootgg/plik:latest
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' rootgg/plik:latest | cut -d'@' -f2)
            echo "Image digest: $DIGEST"

            # Reštart container
            docker compose down 2>/dev/null || true
            docker compose up -d --remove-orphans

            # Počkaj na startup
            sleep 15

            # Health check
            if docker compose ps | grep -q "unhealthy"; then
              echo "❌ Container is unhealthy!"
              docker compose logs --tail=50
              exit 1
            fi

            # Internal HTTP test
            if ! curl -sf http://localhost:3005 > /dev/null; then
              echo "❌ HTTP health check failed!"
              docker compose logs --tail=50
              exit 1
            fi

            echo "✅ Deployment successful"
            docker compose ps

      # 4. External HTTPS test
      - name: Verify production URL
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://files.goodboog.com || echo "000")
          if [[ "$STATUS" =~ ^(200|301|302)$ ]]; then
            echo "✅ Production URL is live (HTTP $STATUS)"
          else
            echo "⚠️ Production URL returned HTTP $STATUS"
            echo "Note: NPM proxy may need manual configuration on first deploy"
          fi

      # 5. Summary
      - name: Deployment summary
        run: |
          echo "🚀 Plik deployed successfully"
          echo "Version tag:  ${{ github.ref_name }}"
          echo "Image:        rootgg/plik:latest"
          echo "Production:   https://files.goodboog.com"
          echo "VPS1 port:    3005 → 8080 (internal)"
