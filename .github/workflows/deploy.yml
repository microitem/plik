name: Deploy Plik to VPS1 (Production)

# Trigger: Push git tag (e.g., v0.1.0)
on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout kódu
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Login do GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Extract metadata (tags, labels)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix={{branch}}-

      # 4. Build Docker image (PRODUCTION variant)
      - name: Build Docker image (production)
        run: |
          docker compose -f docker-compose.production.yml build --no-cache
          docker tag plik-server:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker tag plik-server:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 5. Push image do GHCR
      - name: Push Docker image to GHCR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 6. Get image digest (pre verification)
      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Expected digest: $DIGEST"

      # 7. Deploy na VPS1 cez SSH
      - name: Deploy to VPS1
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS1_HOST }}
          username: ${{ secrets.VPS1_USER }}
          key: ${{ secrets.VPS1_SSH_KEY }}
          port: ${{ secrets.VPS1_PORT }}
          script: |
            set -e
            
            # Prejdi do projektu
            cd /opt/plik || { echo "ERROR: /opt/plik does not exist"; exit 1; }
            
            # Login do GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull nový image
            docker compose pull
            
            # Verify digest (bezpečnostná kontrola)
            PULLED_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest | cut -d'@' -f2)
            EXPECTED_DIGEST="${{ steps.digest.outputs.digest }}"
            
            if [ "$PULLED_DIGEST" != "$EXPECTED_DIGEST" ]; then
              echo "ERROR: Digest mismatch! Deployment aborted."
              echo "Expected: $EXPECTED_DIGEST"
              echo "Got: $PULLED_DIGEST"
              exit 1
            fi
            
            echo "✅ Digest verification passed"
            
            # Zastaviť starý container
            docker compose down
            
            # Spustiť nový container
            docker compose up -d --remove-orphans
            
            # Počkaj na startup
            sleep 10
            
            # Health check
            if docker compose ps | grep -q "unhealthy"; then
              echo "ERROR: Container is unhealthy!"
              docker compose logs --tail=50
              exit 1
            fi
            
            # Internal HTTP test
            if ! curl -f http://localhost:8080 > /dev/null 2>&1; then
              echo "ERROR: Health check failed!"
              docker compose logs --tail=50
              exit 1
            fi
            
            echo "✅ Deployment successful"
            docker compose ps

      # 8. External health check (verejná URL)
      - name: Verify production URL
        run: |
          sleep 5
          curl -f https://files.goodboog.com || { echo "ERROR: Production URL not responding"; exit 1; }
          echo "✅ Production URL is live"

      # 9. Notify (voliteľné)
      - name: Deployment summary
        run: |
          echo "🚀 Plik deployed successfully"
          echo "Version: ${{ github.ref_name }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "Digest: ${{ steps.digest.outputs.digest }}"
          echo "Production URL: https://files.goodboog.com"
